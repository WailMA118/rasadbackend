<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — رصد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(29, 158, 117, 0.5);
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #1d9e75;
      --accent-hover: #178260;
      --accent-glow: rgba(29, 158, 117, 0.3);
      --card-bg: rgba(22, 27, 34, 0.6);
      --input-bg: rgba(13, 17, 23, 0.8);
      --font: 'IBM Plex Sans Arabic', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at top left, rgba(29, 158, 117, 0.15), transparent 40%),
        radial-gradient(circle at bottom right, rgba(55, 138, 221, 0.1), transparent 40%);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.5s ease-out;
    }

    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #0f6e56);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2;
      fill: none;
    }

    .auth-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
    }

    .form-control::placeholder {
      color: #484f58;
    }


    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px var(--accent-glow);
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-submit:active {
      transform: translateY(0);
    }


    .back-home {
      position: absolute;
      top: 30px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: var(--text);
    }

    .back-home svg {
      width: 16px;
      height: 16px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

  <a href="index.html" class="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    العودة للرئيسية
  </a>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <h1>مرحباً بعودتك</h1>
        <p>قم بتسجيل الدخول للوصول إلى لوحة التحكم الخاصة بك</p>
      </div>

      <form action="rasad (3).html" method="get">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">تسجيل الدخول</button>
      </form>
    </div>
  </div>

</body>

</html>
