<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رصد — نظام تحليل الأراضي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-glass: rgba(22, 27, 34, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.15);
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #1d9e75;
      --accent-hover: #178260;
      --accent-glow: rgba(29, 158, 117, 0.3);
      --card-bg: rgba(30, 35, 45, 0.5);
      --gradient-start: #1d9e75;
      --gradient-end: #0f6e56;
      --font: 'IBM Plex Sans Arabic', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(29, 158, 117, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(55, 138, 221, 0.05), transparent 25%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 22px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      stroke: white;
      stroke-width: 2;
      fill: none;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
    }

    .btn-outline {
      background: transparent;
      border-color: var(--border-light);
      color: var(--text);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text);
    }


    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 120px 20px 60px;
      position: relative;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(29, 158, 117, 0.1);
      border: 1px solid rgba(29, 158, 117, 0.2);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      animation: fadeInDown 0.8s ease-out;
    }

    .hero h1 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
      color: transparent;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .hero p {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-muted);
      max-width: 600px;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 40px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
    }

    .footer-text {
      color: var(--text-muted);
      font-size: 14px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 15px;
      }

      .hero-btns {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
      }

    }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
      رصد
    </a>
  </nav>

  <section class="hero">

    <h1>نظام متكامل لتحليل<br>ورصد الأراضي</h1>
    <p>منصة ذكية وحلول مبتكرة لتتبع، تحليل، وإدارة الأراضي والممتلكات باستخدام أحدث التقنيات لبيانات دقيقة ورؤى شاملة.
    </p>
    <div class="hero-btns">
      <a href="login.html" class="btn btn-outline" style="padding: 14px 32px; font-size: 16px;">الدخول للنظام</a>
    </div>

  </section>

  <footer>
    <div class="logo">
      <div class="logo-icon" style="width: 24px; height: 24px; border-radius: 6px;">
        <svg viewBox="0 0 24 24" style="width: 14px; height: 14px;">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
      رصد
    </div>
    <div class="footer-text">
      &copy; 2026 منصة رصد. جميع الحقوق محفوظة.
    </div>
  </footer>

  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
          behavior: 'smooth'
        });
      });
    });
  </script>
</body>

</html>
